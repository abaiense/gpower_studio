version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gpower_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gpower
      POSTGRES_PASSWORD: gpower_dev
      POSTGRES_DB: gpower_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpower -d gpower_studio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gpower_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
